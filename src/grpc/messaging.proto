syntax = "proto3";
package messaging;

service MessagingService {
  rpc SendMessage (MessageRequest) returns (MessageResponse);
}

message MessageRequest {
  string sender    = 1;
  int64  timestamp = 2;
  string message   = 3;
}

message MessageResponse {
  string sender    = 1;
  int64  timestamp = 2;
  string status    = 3;
}